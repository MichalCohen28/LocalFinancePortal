<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow | מיזוג נתונים חכם</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Assistant', 'sans-serif'] },
                    colors: {
                        dark: {
                            900: '#050505',
                            800: '#0f1115',
                            700: '#161b22'
                        },
                        accent: {
                            cyan: '#06b6d4',
                            indigo: '#6366f1'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: radial-gradient(circle at top left, #0f172a 0%, #050505 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .gradient-text {
            background: linear-gradient(135deg, #818cf8 0%, #22d3ee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-glow {
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #6366f1 0%, #06b6d4 100%);
        }
        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        input, select {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        input:focus {
            border-color: #6366f1 !important;
            outline: none;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col font-sans overflow-x-hidden">

    <header class="py-10 px-4">
        <div class="max-w-4xl mx-auto text-center">
            <div class="inline-block p-3 rounded-2xl bg-accent-indigo/10 mb-4">
                <i class="fa-solid fa-layer-group text-3xl text-accent-cyan"></i>
            </div>
            <h1 class="text-5xl font-extrabold tracking-tight mb-3">
                <span class="gradient-text">Finance</span>Flow
            </h1>
            <p class="text-slate-400 text-lg font-light">מיזוג ואנליזת נתונים פיננסיים בלחיצת כפתור</p>
        </div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto px-4 pb-20 w-full">
        
        <div class="glass-card rounded-3xl p-8 md:p-12 shadow-2xl mb-12">
            <form id="dataForm" class="space-y-10">
                
                <div class="relative">
                    <label class="block text-xs font-bold uppercase tracking-widest text-accent-cyan mb-3 mr-1">סימולי מניות</label>
                    <input type="text" id="tickers" name="tickers" placeholder="AAPL, TSLA, BTC-USD..." required
                        class="w-full px-6 py-5 rounded-2xl transition-all text-left font-mono text-lg" dir="ltr">
                    <i class="fa-solid fa-magnifying-glass absolute left-6 top-[52px] text-slate-500"></i>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-400 mr-1 uppercase">מתאריך</label>
                        <input type="date" id="startDate" name="startDate" required
                            class="w-full px-5 py-4 rounded-2xl outline-none">
                    </div>
                    
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-400 mr-1 uppercase">עד תאריך</label>
                        <input type="date" id="endDate" name="endDate" required
                            class="w-full px-5 py-4 rounded-2xl outline-none">
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-400 mr-1 uppercase">תדירות</label>
                        <select id="frequency" name="frequency" required
                            class="w-full px-5 py-4 rounded-2xl outline-none appearance-none cursor-pointer">
                            <option value="1d">יומי</option>
                            <option value="1wk">שבועי</option>
                            <option value="1mo">חודשי</option>
                        </select>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" id="submitBtn" 
                        class="btn-glow w-full py-5 text-white font-bold rounded-2xl text-xl flex items-center justify-center gap-3">
                        <span>סנכרן נתונים</span>
                        <i class="fa-solid fa-arrow-rotate-right"></i>
                    </button>
                </div>
            </form>
        </div>

        <div id="loadingState" class="hidden flex flex-col items-center justify-center py-12">
            <div class="w-16 h-16 border-4 border-accent-indigo/20 border-t-accent-cyan rounded-full animate-spin mb-6"></div>
            <h3 class="text-xl font-medium text-white">יוצר קשר עם הבורסה...</h3>
            <p class="text-slate-500 mt-2">מעבד נתונים ומכין קובץ CSV</p>
        </div>

        <div id="resultsSection" class="hidden space-y-8 animate-in fade-in duration-700">
            <div class="glass-card rounded-3xl overflow-hidden border-accent-cyan/20">
                <div class="px-8 py-6 bg-white/5 border-b border-white/5 flex justify-between items-center">
                    <h2 class="text-lg font-semibold flex items-center gap-3">
                        <span class="w-2 h-2 rounded-full bg-accent-cyan"></span>
                        תצוגת נתונים אחרונה
                    </h2>
                </div>
                
                <div class="p-4">
                    <div class="overflow-x-auto custom-scrollbar rounded-xl">
                        <table id="previewTable" class="w-full text-right border-collapse">
                            <thead id="tableHead" class="text-slate-400 text-xs uppercase bg-white/5"></thead>
                            <tbody id="tableBody" class="text-sm divide-y divide-white/5"></tbody>
                        </table>
                    </div>

                    <div class="mt-8 flex flex-col sm:flex-row items-center justify-between gap-6 p-4 bg-accent-indigo/5 rounded-2xl border border-accent-indigo/10">
                        <div class="text-right">
                            <h4 class="font-bold text-white">הקובץ מוכן!</h4>
                            <p class="text-slate-400 text-sm">הנתונים נשמרו בתיקיית ה-Drive שלך</p>
                        </div>
                        <a id="downloadBtn" href="#" target="_blank"
                            class="w-full sm:w-auto px-8 py-4 bg-white text-dark-900 font-bold rounded-xl hover:bg-slate-200 transition-all flex items-center justify-center gap-3">
                            <i class="fa-solid fa-download"></i>
                            <span>הורדת CSV</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="errorModal" class="hidden fixed inset-0 bg-dark-900/90 backdrop-blur-md z-50 flex items-center justify-center p-6">
        <div class="glass-card rounded-3xl max-w-md w-full p-8 border-red-500/30">
            <div class="text-red-400 mb-6 flex items-center gap-3">
                <i class="fa-solid fa-circle-exclamation text-3xl"></i>
                <h3 class="text-2xl font-bold">משהו השתבש</h3>
            </div>
            <div id="errorMessage" class="text-slate-300 mb-8 bg-red-500/5 p-4 rounded-xl font-mono text-sm border border-red-500/10"></div>
            <button onclick="closeErrorModal()" class="w-full py-4 bg-white/10 hover:bg-white/20 text-white font-bold rounded-xl transition-all">
                סגור ונסה שוב
            </button>
        </div>
    </div>

    <script>
        const form = document.getElementById('dataForm');
        const submitBtn = document.getElementById('submitBtn');
        const loadingState = document.getElementById('loadingState');
        const resultsSection = document.getElementById('resultsSection');
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorModal = document.getElementById('errorModal');
        const errorMessage = document.getElementById('errorMessage');

        const API_URL = 'https://script.google.com/macros/s/AKfycbw9E93fpmtq-TBsA_FMzUFzGke7u1ofdrhH12dHGHZ0_fXo_K6rXVJxXxVlIn66my6V/exec';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            resultsSection.classList.add('hidden');
            loadingState.classList.remove('hidden');
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.5';

            const tickers = document.getElementById('tickers').value.split(',').map(t => t.trim().toUpperCase()).filter(t => t);
            const payload = {
                tickers: tickers,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload),
                    redirect: 'follow'
                });

                const data = await response.json();

                if (data.status === 'success') {
                    renderTable(data.previewData);
                    downloadBtn.href = data.downloadUrl;
                    resultsSection.classList.remove('hidden');
                } else {
                    throw new Error(data.message || 'שגיאה לא ידועה');
                }
            } catch (err) {
                showError(err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
                loadingState.classList.add('hidden');
            }
        });

        function renderTable(data) {
            tableHead.innerHTML = ''; tableBody.innerHTML = '';
            if (!data || data.length === 0) return;

            const headerRow = document.createElement('tr');
            data[0].forEach(h => {
                const th = document.createElement('th');
                th.className = 'px-6 py-4 text-right font-semibold';
                th.innerHTML = `<span dir="ltr">${h}</span>`;
                headerRow.appendChild(th);
            });
            tableHead.appendChild(headerRow);

            data.slice(1, 7).forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-white/5 transition-colors';
                row.forEach((cell, i) => {
                    const td = document.createElement('td');
                    td.className = 'px-6 py-4 font-mono';
                    const val = i > 0 && cell !== "" && !isNaN(cell) ? parseFloat(cell).toLocaleString(undefined, {minimumFractionDigits: 2}) : cell;
                    td.innerHTML = `<span dir="ltr" class="${i > 0 ? 'text-accent-cyan' : 'text-slate-300'}">${val}</span>`;
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });
        }

        function showError(msg) {
            errorMessage.innerText = msg;
            errorModal.classList.remove('hidden');
        }

        function closeErrorModal() { errorModal.classList.add('hidden'); }

        window.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const yearAgo = new Date(); yearAgo.setFullYear(today.getFullYear() - 1);
            document.getElementById('endDate').valueAsDate = today;
            document.getElementById('startDate').valueAsDate = yearAgo;
        });
    </script>
</body>
</html>
